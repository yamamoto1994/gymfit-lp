/* ===== Flow ===== */
.flow {
  background: #D8F3DC;
  padding: 80px 40px;
}
.flow-inner {
  max-width: 960px;
  margin: 0 auto;
}
.flow-label {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: #F4845F;
  font-weight: 500;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  font-family: sans-serif;
}
.flow-label::before {
  content: '';
  display: inline-block;
  width: 26px;
  height: 1px;
  background: #F4845F;
}
.flow-title {
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 300;
  color: #2D6A4F;
  margin-bottom: 8px;
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
}
.flow-desc {
  font-size: 13px;
  color: #3D5A47;
  margin-bottom: 52px;
  line-height: 1.9;
  font-family: sans-serif;
}
.flow-steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  position: relative;
  gap: 0;
}
.flow-steps::before {
  content: '';
  position: absolute;
  top: 32px;
  left: calc(12.5% + 6px);
  right: calc(12.5% + 6px);
  height: 2px;
  background: linear-gradient(90deg, #52B788, #F4845F);
}
.flow-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 0 12px;
  position: relative;
  font-family: sans-serif;
}
.flow-num {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  font-family: Georgia, serif;
}
.flow-step:nth-child(1) .flow-num { background: #2D6A4F; }
.flow-step:nth-child(2) .flow-num { background: #52B788; }
.flow-step:nth-child(3) .flow-num { background: #F9A87A; }
.flow-step:nth-child(4) .flow-num { background: #F4845F; }
.flow-icon { font-size: 20px; margin-bottom: 8px; }
.flow-step-title {
  font-size: 14px;
  font-weight: 700;
  color: #2D6A4F;
  margin-bottom: 8px;
  line-height: 1.4;
}
.flow-step-desc {
  font-size: 12px;
  color: #3D5A47;
  line-height: 1.85;
}
.flow-time {
  display: inline-block;
  margin-top: 10px;
  background: #fff;
  color: #F4845F;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 12px;
  border-radius: 50px;
}
.flow-notes {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-top: 40px;
}
.flow-note-item {
  background: #fff;
  border: 1.5px solid #95D5B2;
  color: #2D6A4F;
  font-size: 12px;
  padding: 6px 18px;
  border-radius: 50px;
  font-family: sans-serif;
}

@media (max-width: 768px) {

  .flow-steps {

    gap: 32px;
  }
  .flow-steps::before { display: none; }

<script>
// 時間セレクトを30分刻みで生成（9:00〜21:30）、初期値 10:00
(function() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const yyyy = tomorrow.getFullYear();
  const mm   = String(tomorrow.getMonth() + 1).padStart(2, '0');
  const dd   = String(tomorrow.getDate()).padStart(2, '0');
  const tomorrowStr = `${yyyy}-${mm}-${dd}`;

  const timeOptions = [];
  for (let h = 9; h <= 21; h++) {
    for (let m of [0, 30]) {
      if (h === 21 && m === 30) break;
      timeOptions.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}〜`);
    }
  }

  [1, 2, 3].forEach(function(n) {
    const dateEl = document.getElementById('date' + n);
    const timeEl = document.getElementById('time' + n);
    dateEl.value = tomorrowStr;
    timeOptions.forEach(function(t) {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      if (t === '10:00〜') opt.selected = true;
      timeEl.appendChild(opt);
    });
  });
})();

document.getElementById('contact-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  const fd = new FormData(this);

  function dateTime(n) {
    const d = fd.get('date' + n);
    const t = fd.get('time' + n);
    return d ? d + ' ' + t : null;
  }

  const f = {
    name:    fd.get('name'),
    email:   fd.get('email'),
    phone:   fd.get('phone')   || '未入力',
    date1:   dateTime(1),
    date2:   dateTime(2),
    date3:   dateTime(3) || '未入力',
    message: fd.get('message') || '未入力',
  };

  // Chatwork通知（サーバー経由）
  const cwBody = [
    '[info][title]GYMFITにお問い合わせがありました[/title]',
    'お名前：'           + f.name,
    'メール：'           + f.email,
    '電話：'             + f.phone,
    '希望日①：'         + f.date1,
    '希望日②：'         + f.date2,
    '希望日③：'         + f.date3,
    'お問い合わせ内容：' + f.message,
    '[/info]',
  ].join('\n');

  try {
    await fetch('/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ body: cwBody }),
    });
  } catch (_) {}

  // FormSubmit経由でメール送信
  fd.append('_subject', 'GYMFITへのお問い合わせ');
  fd.append('_captcha', 'false');
  try {
    await fetch('https://formsubmit.co/gymfit.zaitou@gmail.com', {
      method: 'POST',
      headers: { 'Accept': 'application/json' },
      body: fd,
    });
    window.location.href = 'thanks.html';
  } catch (_) {
    btn.disabled = false;
    btn.textContent = '送信する';
    alert('送信に失敗しました。お電話またはLINEにてお問い合わせください。');
  }
});
</script>
